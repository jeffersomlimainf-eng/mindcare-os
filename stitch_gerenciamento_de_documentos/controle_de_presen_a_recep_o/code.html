<!DOCTYPE html>

<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#1392ec",
              "background-light": "#f6f7f8",
              "background-dark": "#101a22",
            },
            fontFamily: {
              "display": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .radio-dot-svg {
            --radio-dot-svg: url('data:image/svg+xml,%3csvg viewBox=%270 0 16 16%27 fill=%27%231392ec%27 xmlns=%27http://www.w3.org/2000/svg%27%3e%3ccircle cx=%278%27 cy=%278%27 r=%273%27/%3e%3c/svg%3e');
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark flex items-center justify-center min-h-screen p-4">
<!-- Modal Container -->
<div class="w-full max-w-[480px] bg-white dark:bg-slate-900 rounded-xl shadow-2xl overflow-hidden border border-slate-200 dark:border-slate-800">
<!-- Header -->
<div class="p-6 border-b border-slate-100 dark:border-slate-800">
<div class="flex items-center justify-between mb-2">
<h1 class="text-slate-900 dark:text-slate-100 text-2xl font-bold font-display">Confirmar Presença</h1>
<button class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<p class="text-slate-500 dark:text-slate-400 text-sm">Atualize o status de chegada para iniciar o atendimento.</p>
</div>
<!-- Patient Info Card -->
<div class="px-6 py-4 bg-slate-50 dark:bg-slate-800/50 flex items-center gap-4">
<div class="h-14 w-14 rounded-full bg-primary/10 flex items-center justify-center overflow-hidden border-2 border-white dark:border-slate-700 shadow-sm">
<img alt="Foto do Paciente" class="h-full w-full object-cover" data-alt="Retrato de um homem sorrindo para perfil de paciente" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDM3siDmU16esCgwxSqMNW9q6ao7TC4oXPbAdZ-L8P4rRVQotx_EHcuLo-Awx728IEMr-_E8Y1gia5x9-_RggjJ2Af6gAzPONymLeaLie2QX7N4PNXqI7piz7vS6xwNi0-oqi47tX7vwQJNEPBizASNyMPhFPmjOmjVm3aviDU2MH7pK4PXVa-ZcABjmGitzd53FwgLnE-pF8tV3P-CO7sqDXSaf0FZzuksL1_36Wik5zQFMwacr9jkUUUKQeZeZQZ2iKRF0DwB3g"/>
</div>
<div class="flex flex-col">
<p class="text-slate-900 dark:text-slate-100 text-base font-semibold leading-tight">João Silva de Almeida</p>
<div class="flex items-center gap-1.5 mt-1">
<span class="material-symbols-outlined text-[16px] text-primary">schedule</span>
<p class="text-slate-600 dark:text-slate-400 text-sm font-medium">14:30 — Dr. Ricardo Oliveira</p>
</div>
</div>
</div>
<!-- Status Options -->
<div class="p-6">
<h3 class="text-slate-900 dark:text-slate-100 text-sm font-bold uppercase tracking-wider mb-4">Status da Recepção</h3>
<div class="flex flex-col gap-3 radio-dot-svg">
<!-- Option: Presente -->
<label class="group flex items-center gap-4 rounded-lg border border-slate-200 dark:border-slate-700 p-4 cursor-pointer hover:border-primary/50 hover:bg-primary/5 transition-all">
<input checked="" class="h-5 w-5 border-2 border-slate-300 dark:border-slate-600 bg-transparent text-transparent checked:border-primary checked:bg-[image:--radio-dot-svg] focus:ring-0 focus:ring-offset-0" name="status" type="radio"/>
<div class="flex grow flex-col">
<div class="flex items-center gap-2">
<span class="text-slate-900 dark:text-slate-100 text-sm font-bold">Presente</span>
<span class="px-2 py-0.5 rounded-full bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-400 text-[10px] font-bold uppercase">No local</span>
</div>
<p class="text-slate-500 dark:text-slate-400 text-xs mt-0.5">O paciente já se encontra aguardando na recepção.</p>
</div>
</label>
<!-- Option: Atrasado -->
<label class="group flex items-center gap-4 rounded-lg border border-slate-200 dark:border-slate-700 p-4 cursor-pointer hover:border-primary/50 hover:bg-primary/5 transition-all">
<input class="h-5 w-5 border-2 border-slate-300 dark:border-slate-600 bg-transparent text-transparent checked:border-primary checked:bg-[image:--radio-dot-svg] focus:ring-0 focus:ring-offset-0" name="status" type="radio"/>
<div class="flex grow flex-col">
<div class="flex items-center gap-2">
<span class="text-slate-900 dark:text-slate-100 text-sm font-bold">Atrasado</span>
<span class="px-2 py-0.5 rounded-full bg-amber-100 dark:bg-amber-900/30 text-amber-700 dark:text-amber-400 text-[10px] font-bold uppercase">Aviso prévio</span>
</div>
<p class="text-slate-500 dark:text-slate-400 text-xs mt-0.5">Paciente informou atraso ou chegou após o horário previsto.</p>
</div>
</label>
<!-- Option: Não Compareceu -->
<label class="group flex items-center gap-4 rounded-lg border border-slate-200 dark:border-slate-700 p-4 cursor-pointer hover:border-primary/50 hover:bg-primary/5 transition-all">
<input class="h-5 w-5 border-2 border-slate-300 dark:border-slate-600 bg-transparent text-transparent checked:border-primary checked:bg-[image:--radio-dot-svg] focus:ring-0 focus:ring-offset-0" name="status" type="radio"/>
<div class="flex grow flex-col">
<div class="flex items-center gap-2">
<span class="text-slate-900 dark:text-slate-100 text-sm font-bold">Não Compareceu</span>
<span class="px-2 py-0.5 rounded-full bg-rose-100 dark:bg-rose-900/30 text-rose-700 dark:text-rose-400 text-[10px] font-bold uppercase">Falta</span>
</div>
<p class="text-slate-500 dark:text-slate-400 text-xs mt-0.5">O paciente não compareceu e não entrou em contato.</p>
</div>
</label>
</div>
</div>
<!-- Footer Actions -->
<div class="flex gap-3 px-6 py-5 bg-slate-50 dark:bg-slate-800/50 border-t border-slate-100 dark:border-slate-800">
<button class="flex-1 px-5 h-12 rounded-lg bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-300 text-sm font-bold hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors">
                Cancelar
            </button>
<button class="flex-[2] px-5 h-12 rounded-lg bg-primary text-white text-sm font-bold hover:bg-primary/90 shadow-md shadow-primary/20 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[20px]">check_circle</span>
                Confirmar Status
            </button>
</div>
</div>
</body></html>
