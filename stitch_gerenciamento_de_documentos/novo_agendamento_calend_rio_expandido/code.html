<!DOCTYPE html>

<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1392ec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101a22",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>Novo Agendamento - Psicologia Clínica</title>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<!-- Main Content Container (Modal Style) -->
<main class="flex flex-1 justify-center py-10 px-4">
<div class="layout-content-container flex flex-col w-full max-w-[800px] bg-white dark:bg-slate-900 rounded-xl shadow-xl overflow-hidden border border-slate-200 dark:border-slate-800">
<!-- Header -->
<header class="flex items-center justify-between border-b border-solid border-slate-100 dark:border-slate-800 px-8 py-6">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary text-3xl">event_upcoming</span>
<h2 class="text-2xl font-bold tracking-tight">Novo Agendamento</h2>
</div>
<button class="flex items-center justify-center rounded-full h-10 w-10 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 hover:bg-slate-200 transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</header>
<div class="p-8 space-y-8">
<!-- Patient Search -->
<section>
<label class="block text-sm font-semibold mb-2 text-slate-700 dark:text-slate-300">Paciente</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-slate-400">search</span>
</div>
<input class="form-input w-full pl-11 pr-4 py-3 bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-lg focus:ring-primary focus:border-primary text-base" placeholder="Buscar por nome, CPF ou prontuário..." type="text"/>
</div>
<p class="mt-2 text-xs text-slate-500">Comece a digitar para ver sugestões de pacientes cadastrados.</p>
</section>
<div class="grid grid-cols-1 md:grid-cols-2 gap-8">
<!-- Date & Time Selection -->
<section class="space-y-4">
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300">Data e Horário</label>
<div class="border border-slate-200 dark:border-slate-700 rounded-xl p-4 bg-slate-50 dark:bg-slate-800/50">
<div class="flex items-center justify-between mb-4">
<button class="p-1 hover:bg-slate-200 dark:hover:bg-slate-700 rounded-full transition-colors">
<span class="material-symbols-outlined">chevron_left</span>
</button>
<p class="font-bold text-sm">Novembro 2023</p>
<button class="p-1 hover:bg-slate-200 dark:hover:bg-slate-700 rounded-full transition-colors">
<span class="material-symbols-outlined">chevron_right</span>
</button>
</div>
<div class="grid grid-cols-7 text-center text-xs font-bold text-slate-400 mb-2">
<div>DOM</div><div>SEG</div><div>TER</div><div>QUA</div><div>QUI</div><div>SEX</div><div>SÁB</div>
</div>
<div class="grid grid-cols-7 gap-1"><!-- Row 1: Oct 29 - Nov 4 -->
<div class="h-9 flex items-center justify-center text-slate-300 text-sm">29</div>
<div class="h-9 flex items-center justify-center text-slate-300 text-sm">30</div>
<div class="h-9 flex items-center justify-center hover:bg-primary/10 rounded-full cursor-pointer text-sm transition-colors">1</div>
<div class="h-9 flex items-center justify-center hover:bg-primary/10 rounded-full cursor-pointer text-sm transition-colors">2</div>
<div class="h-9 flex items-center justify-center hover:bg-primary/10 rounded-full cursor-pointer text-sm transition-colors">3</div>
<div class="h-9 flex items-center justify-center bg-primary text-white font-bold rounded-full cursor-pointer shadow-sm text-sm">4</div>
<div class="h-9 flex items-center justify-center hover:bg-primary/10 rounded-full cursor-pointer text-sm transition-colors">5</div>
<!-- Row 2: Nov 6 - Nov 11 -->
<div class="h-9 flex items-center justify-center hover:bg-primary/10 rounded-full cursor-pointer text-sm transition-colors">6</div>
<div class="h-9 flex items-center justify-center hover:bg-primary/10 rounded-full cursor-pointer text-sm transition-colors">7</div>
<div class="h-9 flex items-center justify-center hover:bg-primary/10 rounded-full cursor-pointer text-sm transition-colors">8</div>
<div class="h-9 flex items-center justify-center hover:bg-primary/10 rounded-full cursor-pointer text-sm transition-colors">9</div>
<div class="h-9 flex items-center justify-center hover:bg-primary/10 rounded-full cursor-pointer text-sm transition-colors">10</div>
<div class="h-9 flex items-center justify-center hover:bg-primary/10 rounded-full cursor-pointer text-sm transition-colors">11</div>
<div class="h-9 flex items-center justify-center hover:bg-primary/10 rounded-full cursor-pointer text-sm transition-colors">12</div>
<!-- Row 3: Nov 13 - Nov 18 -->
<div class="h-9 flex items-center justify-center hover:bg-primary/10 rounded-full cursor-pointer text-sm transition-colors">13</div>
<div class="h-9 flex items-center justify-center hover:bg-primary/10 rounded-full cursor-pointer text-sm transition-colors">14</div>
<div class="h-9 flex items-center justify-center hover:bg-primary/10 rounded-full cursor-pointer text-sm transition-colors">15</div>
<div class="h-9 flex items-center justify-center hover:bg-primary/10 rounded-full cursor-pointer text-sm transition-colors">16</div>
<div class="h-9 flex items-center justify-center hover:bg-primary/10 rounded-full cursor-pointer text-sm transition-colors">17</div>
<div class="h-9 flex items-center justify-center hover:bg-primary/10 rounded-full cursor-pointer text-sm transition-colors">18</div>
<div class="h-9 flex items-center justify-center hover:bg-primary/10 rounded-full cursor-pointer text-sm transition-colors">19</div>
<!-- Row 4: Nov 20 - Nov 25 -->
<div class="h-9 flex items-center justify-center hover:bg-primary/10 rounded-full cursor-pointer text-sm transition-colors">20</div>
<div class="h-9 flex items-center justify-center hover:bg-primary/10 rounded-full cursor-pointer text-sm transition-colors">21</div>
<div class="h-9 flex items-center justify-center hover:bg-primary/10 rounded-full cursor-pointer text-sm transition-colors">22</div>
<div class="h-9 flex items-center justify-center hover:bg-primary/10 rounded-full cursor-pointer text-sm transition-colors">23</div>
<div class="h-9 flex items-center justify-center hover:bg-primary/10 rounded-full cursor-pointer text-sm transition-colors">24</div>
<div class="h-9 flex items-center justify-center hover:bg-primary/10 rounded-full cursor-pointer text-sm transition-colors">25</div>
<div class="h-9 flex items-center justify-center hover:bg-primary/10 rounded-full cursor-pointer text-sm transition-colors">26</div>
<!-- Row 5: Nov 27 - Dec 2 -->
<div class="h-9 flex items-center justify-center hover:bg-primary/10 rounded-full cursor-pointer text-sm transition-colors">27</div>
<div class="h-9 flex items-center justify-center hover:bg-primary/10 rounded-full cursor-pointer text-sm transition-colors">28</div>
<div class="h-9 flex items-center justify-center hover:bg-primary/10 rounded-full cursor-pointer text-sm transition-colors">29</div>
<div class="h-9 flex items-center justify-center hover:bg-primary/10 rounded-full cursor-pointer text-sm transition-colors">30</div>
<div class="h-9 flex items-center justify-center text-slate-300 text-sm">1</div>
<div class="h-9 flex items-center justify-center text-slate-300 text-sm">2</div>
<div class="h-9 flex items-center justify-center text-slate-300 text-sm">3</div></div>
</div>
<div class="grid grid-cols-2 gap-3">
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm">schedule</span>
<select class="form-select w-full pl-10 bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-lg text-sm">
<option>08:00</option>
<option selected="">09:00</option>
<option>10:00</option>
<option>11:00</option>
</select>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm">hourglass_empty</span>
<select class="form-select w-full pl-10 bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-lg text-sm">
<option>30 min</option>
<option selected="">50 min</option>
<option>90 min</option>
</select>
</div>
</div>
</section>
<!-- Service & Recurrence -->
<section class="space-y-6">
<div>
<label class="block text-sm font-semibold mb-3 text-slate-700 dark:text-slate-300">Tipo de Atendimento</label>
<div class="grid grid-cols-2 gap-3">
<label class="flex items-center justify-center gap-2 p-3 border-2 border-primary bg-primary/5 rounded-lg cursor-pointer">
<input checked="" class="hidden" name="service" type="radio"/>
<span class="material-symbols-outlined text-primary">person</span>
<span class="text-sm font-medium">Presencial</span>
</label>
<label class="flex items-center justify-center gap-2 p-3 border-2 border-slate-200 dark:border-slate-700 rounded-lg cursor-pointer hover:border-primary/50 transition-colors">
<input class="hidden" name="service" type="radio"/>
<span class="material-symbols-outlined text-slate-500">videocam</span>
<span class="text-sm font-medium">Teleconsulta</span>
</label>
</div>
</div>
<div>
<label class="block text-sm font-semibold mb-3 text-slate-700 dark:text-slate-300">Recorrência</label>
<div class="space-y-2">
<label class="flex items-center gap-3 p-3 bg-slate-50 dark:bg-slate-800 rounded-lg border border-slate-100 dark:border-slate-700 cursor-pointer">
<input checked="" class="w-4 h-4 text-primary focus:ring-primary border-slate-300" name="recurrence" type="radio"/>
<div class="flex flex-col">
<span class="text-sm font-medium">Sessão Única</span>
</div>
</label>
<label class="flex items-center gap-3 p-3 bg-slate-50 dark:bg-slate-800 rounded-lg border border-slate-100 dark:border-slate-700 cursor-pointer">
<input class="w-4 h-4 text-primary focus:ring-primary border-slate-300" name="recurrence" type="radio"/>
<div class="flex flex-col">
<span class="text-sm font-medium">Semanal</span>
<span class="text-xs text-slate-500">Toda quarta-feira</span>
</div>
</label>
<label class="flex items-center gap-3 p-3 bg-slate-50 dark:bg-slate-800 rounded-lg border border-slate-100 dark:border-slate-700 cursor-pointer">
<input class="w-4 h-4 text-primary focus:ring-primary border-slate-300" name="recurrence" type="radio"/>
<div class="flex flex-col">
<span class="text-sm font-medium">Quinzenal</span>
<span class="text-xs text-slate-500">A cada 15 dias</span>
</div>
</label>
</div>
</div>
</section>
</div>
<!-- Notes -->
<section>
<label class="block text-sm font-semibold mb-2 text-slate-700 dark:text-slate-300">Observações Adicionais</label>
<textarea class="form-textarea w-full bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-lg focus:ring-primary focus:border-primary text-sm" placeholder="Ex: Paciente solicitou urgência, primeira consulta, etc..." rows="3"></textarea>
</section>
</div>
<!-- Footer Buttons -->
<footer class="flex items-center justify-end gap-4 bg-slate-50 dark:bg-slate-800/50 px-8 py-6 border-t border-slate-100 dark:border-slate-800">
<button class="px-6 py-2.5 text-sm font-bold text-slate-600 dark:text-slate-300 hover:text-slate-900 dark:hover:text-white transition-colors">
                            Cancelar
                        </button>
<button class="px-8 py-2.5 bg-primary hover:bg-primary/90 text-white text-sm font-bold rounded-lg shadow-lg shadow-primary/20 transition-all flex items-center gap-2">
<span class="material-symbols-outlined text-base">check_circle</span>
                            Confirmar Agendamento
                        </button>
</footer>
</div>
</main>
</div>
</div>
</body></html>
